<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1a0a2e"/>
  <!-- Pixel border -->
  <rect x="8" y="8" width="496" height="496" fill="none" stroke="#ff6b35" stroke-width="8"/>
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#4a2a6e" stroke-width="4"/>
  <!-- Ghost/Pac-man style character -->
  <g transform="translate(256, 200)">
    <!-- Body -->
    <rect x="-60" y="-60" width="120" height="100" fill="#39ff14" rx="0"/>
    <!-- Wavy bottom -->
    <rect x="-60" y="40" width="30" height="20" fill="#39ff14"/>
    <rect x="-10" y="40" width="30" height="20" fill="#39ff14"/>
    <rect x="30" y="40" width="30" height="20" fill="#39ff14"/>
    <!-- Eyes -->
    <rect x="-40" y="-30" width="25" height="25" fill="white"/>
    <rect x="15" y="-30" width="25" height="25" fill="white"/>
    <rect x="-30" y="-20" width="15" height="15" fill="#1a0a2e"/>
    <rect x="25" y="-20" width="15" height="15" fill="#1a0a2e"/>
  </g>
  <!-- Text -->
  <text x="256" y="360" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#ff6b35">NOSTAL</text>
  <text x="256" y="400" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#ffaa00">GAME</text>
  <!-- Decorative pixels -->
  <rect x="40" y="40" width="12" height="12" fill="#ff1493"/>
  <rect x="460" y="40" width="12" height="12" fill="#00f3ff"/>
  <rect x="40" y="460" width="12" height="12" fill="#ffff00"/>
  <rect x="460" y="460" width="12" height="12" fill="#39ff14"/>
</svg>
